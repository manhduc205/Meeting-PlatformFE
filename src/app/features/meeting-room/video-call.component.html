<div class="vc-root">

  <!-- ===== CONNECTING OVERLAY ===== -->
  <div class="vc-connecting" *ngIf="ms.connectionState() === 'connecting'">
    <div class="connecting-card">
      <div class="connecting-spinner"></div>
      <h2>Joining meeting…</h2>
      <p>{{ ms.meetingCode() }}</p>
    </div>
  </div>

  <!-- ===== ERROR OVERLAY ===== -->
  <div class="vc-connecting vc-error" *ngIf="ms.connectionState() === 'error'">
    <div class="connecting-card">
      <div class="error-icon">⚠️</div>
      <h2>Could not connect</h2>
      <p>Check that the backend and LiveKit server are running, then try again.</p>
      <div class="left-actions">
        <button class="rejoin-btn" (click)="ms.rejoin()">Retry</button>
        <button class="home-btn" (click)="navigateHome()">Go Home</button>
      </div>
    </div>
  </div>

  <!-- ===== LEFT: Meeting view ===== -->
  <ng-container *ngIf="!ms.hasLeft() && ms.connectionState() === 'connected'">

    <!-- Top bar -->
    <app-top-bar
      [meetingTitle]="ms.meetingTitle()"
      [meetingCode]="ms.meetingCode()"
      [participantCount]="ms.allParticipants().length"
      [localUserName]="ms.localParticipant()?.name ?? ''"
      [localUserInitials]="ms.localParticipant()?.initials ?? ''"
    ></app-top-bar>

    <!-- Main body -->
    <div class="vc-body">

      <!-- Video area + overlays -->
      <div class="vc-video-area">

        <!-- Screen sharing banner -->
        <div class="sharing-banner" *ngIf="ms.isScreenSharing()">
          <span class="sharing-dot"></span>
          You are sharing your screen
        </div>

        <!-- ===== REACTION ANIMATION OVERLAY ===== -->
        <div class="reaction-overlay" aria-hidden="true">
          <div
            *ngFor="let r of floatingReactions()"
            class="reaction-particle"
            [style.left.%]="r.xOffset"
          >
            <span class="reaction-emoji">{{ r.emoji }}</span>
            <span class="reaction-sender">{{ r.senderName }}</span>
          </div>
        </div>

        <!-- Toast notification -->
        <div class="vc-toast" *ngIf="ms.toastMessage()"
             [class.toast-success]="ms.toastMessage()?.type === 'success'"
             [class.toast-error]="ms.toastMessage()?.type === 'error'">
          {{ ms.toastMessage()?.text }}
        </div>

        <!-- ===== HOST KNOCK NOTIFICATIONS (Waiting Room Toasts) ===== -->
        <app-knock-notifications *ngIf="ms.isHost()"></app-knock-notifications>

        <!-- Video grid — uses allParticipants (local + remote) -->
        <div class="vc-grid-wrapper">
          <app-video-grid
            [participants]="ms.allParticipants()"
            localParticipantId="local"
          ></app-video-grid>
        </div>

        <!-- Whiteboard — use [hidden] NOT *ngIf so the canvas content is preserved when toggled off -->
        <app-whiteboard [hidden]="!ms.showWhiteboard()"></app-whiteboard>

        <!-- Control bar -->
        <app-control-bar></app-control-bar>

        <!-- Host Tools Panel -->
        <app-host-tools-panel
          *ngIf="ms.showHostTools()"
          [participants]="ms.allParticipants()"
          (closePanel)="ms.showHostTools.set(false)"
        ></app-host-tools-panel>

        <!-- Raised Hands Panel — visible to host when raisedHandCount > 0 -->
        <app-raised-hands-panel
          *ngIf="ms.showRaisedHands()"
          (closePanel)="ms.showRaisedHands.set(false)"
        ></app-raised-hands-panel>

        <!-- AI Panel (floating over video) -->
        <app-ai-panel *ngIf="ms.showAIPanel()" class="ai-panel-float"></app-ai-panel>
      </div>

      <!-- Sidebar -->
      <app-sidebar *ngIf="ms.sidebarTab()"></app-sidebar>

    </div>
  </ng-container>

  <!-- ===== Left meeting screen ===== -->
  <div class="vc-left-screen" *ngIf="ms.hasLeft()">
    <div class="left-card">
      <div class="left-icon">
        <svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 5a2 2 0 0 1 2-2h3.28a1 1 0 0 1 .948.684l1.498 4.493a1 1 0 0 1-.502 1.21l-2.257 1.13a11.042 11.042 0 0 0 5.516 5.516l1.13-2.257a1 1 0 0 1 1.21-.502l4.493 1.498a1 1 0 0 1 .684.949V19a2 2 0 0 1-2 2h-1C9.716 21 3 14.284 3 6V5z"/>
        </svg>
      </div>
      <h2>You've left the meeting</h2>
      <p>The meeting has ended for you.</p>
      <div class="left-actions">
        <button class="rejoin-btn" (click)="ms.rejoin()">Rejoin Meeting</button>
        <button class="home-btn" (click)="navigateHome()">Back to Home</button>
      </div>
    </div>
  </div>

</div>
