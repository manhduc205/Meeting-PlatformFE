<div class="app-wrapper">
  <!-- Mobile overlay -->
  <div class="sidebar-overlay" [class.active]="sidebarOpen()" (click)="closeSidebar()"></div>

  <!-- Sidebar -->
  <aside class="sidebar" [class.open]="sidebarOpen()">
    <div class="sidebar-logo">
      <div class="logo-icon">
        <span class="material-symbols-outlined">videocam</span>
      </div>
      <div class="logo-text">
        <h1>VideoConnect</h1>
        <p>Enterprise</p>
      </div>
    </div>

    <nav class="sidebar-nav">
      <a
        *ngFor="let item of navItems"
        [routerLink]="item.route"
        [routerLinkActive]="['active']"
        [routerLinkActiveOptions]="{exact: item.route === '/'}"
        class="nav-item"
        (click)="closeSidebar()"
      >
        <span class="material-symbols-outlined">{{ item.icon }}</span>
        <span>{{ item.label }}</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="storage-card">
        <p class="storage-label">Storage</p>
        <div class="storage-bar">
          <div class="storage-fill"></div>
        </div>
        <p class="storage-info">7.5GB of 10GB used</p>
      </div>
      <button class="upgrade-btn">
        <span class="material-symbols-outlined">upgrade</span>
        Upgrade
      </button>
    </div>
  </aside>

  <!-- Main -->
  <main class="main-content">
    <!-- Header -->
    <header class="app-header">
      <button class="hamburger" (click)="toggleSidebar()">
        <span class="material-symbols-outlined">menu</span>
      </button>

      <div class="search-wrapper">
        <span class="material-symbols-outlined search-icon">search</span>
        <input type="text" class="search-input" placeholder="Search meetings, contacts..." />
      </div>

      <div class="header-actions">
        <button class="icon-btn notif-btn">
          <span class="material-symbols-outlined">notifications</span>
          <span class="notif-dot"></span>
        </button>
        <button class="icon-btn">
          <span class="material-symbols-outlined">settings</span>
        </button>
        <div class="divider"></div>
        <div class="user-info" (click)="toggleUserMenu()">
          <div class="user-text">
            <p class="user-name">{{ user?.name || 'Đang rải...' }}</p>
            <p class="user-role">{{ user?.email || 'Người dùng' }}</p>
          </div>
          <img
            class="avatar"
            [src]="user?.picture || 'https://ui-avatars.com/api/?name=User&background=2d6ef7&color=fff'"
            [alt]="user?.name || 'User Avatar'"
          />

          <!-- Dropdown menu -->
          @if (showUserMenu()) {
            <div class="user-dropdown-menu" (click)="$event.stopPropagation()">
              <div class="dropdown-header">
                <p class="dropdown-name">{{ user?.name }}</p>
                <p class="dropdown-email">{{ user?.email }}</p>
              </div>
              <div class="dropdown-divider"></div>
              <button class="dropdown-item logout-btn" (click)="onLogout()">
                <span class="material-symbols-outlined">logout</span>
                Đăng xuất
              </button>
            </div>
          }
        </div>
      </div>
    </header>

    <!-- Page content -->
    <div class="page-content" style="padding: 0;">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
